<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZombieAPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-main);
        }
        .login-card {
            width: 400px;
            padding: 2.5rem;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: var(--accent-primary);
            background: rgba(108, 92, 231, 0.05);
        }
        #webcamContainer {
            display: none;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }
        #webcam {
            width: 100%;
            display: block;
            background: #000;
        }
        .action-btns {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .action-btns button {
            flex: 1;
        }
        .error-msg {
            color: var(--accent-danger);
            margin-top: 1rem;
            font-size: 0.95rem;
            min-height: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card glass-panel">
        <div class="logo" style="margin: 0 auto 1.5rem auto; width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent-primary), #a29bfe); border-radius: 16px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);"></div>
        <h2>ZombieAPI Dashboard</h2>
        <p>Admin Face Authentication required</p>

        <!-- Upload Mode -->
        <div id="uploadMode">
            <div class="upload-area" onclick="document.getElementById('faceFile').click()">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p style="margin-top: 1rem; margin-bottom: 0;">Click to select face image</p>
                <span id="fileNameDisplay" style="font-size: 0.85rem; color: var(--accent-primary); display: block; margin-top: 0.5rem; font-weight: 500;"></span>
            </div>
            <input type="file" id="faceFile" accept="image/*" hidden>
        </div>

        <!-- Webcam Mode -->
        <div id="webcamContainer">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <div class="action-btns">
            <button class="action-btn" id="toggleWebcamBtn">Use Webcam</button>
            <button class="action-btn primary" id="loginBtn">Login</button>
        </div>

        <div id="statusMsg" class="error-msg"></div>
    </div>

    <script>
        const faceFile = document.getElementById('faceFile');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const toggleWebcamBtn = document.getElementById('toggleWebcamBtn');
        const webcamContainer = document.getElementById('webcamContainer');
        const uploadMode = document.getElementById('uploadMode');
        const webcam = document.getElementById('webcam');
        const loginBtn = document.getElementById('loginBtn');
        const statusMsg = document.getElementById('statusMsg');

        let isWebcamMode = false;
        let stream = null;

        faceFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
            statusMsg.textContent = '';
            statusMsg.style.color = 'var(--accent-danger)';
        });

        toggleWebcamBtn.addEventListener('click', async () => {
            if (!isWebcamMode) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    webcam.srcObject = stream;
                    webcamContainer.style.display = 'block';
                    uploadMode.style.display = 'none';
                    toggleWebcamBtn.textContent = 'Use Upload';
                    isWebcamMode = true;
                    statusMsg.textContent = '';
                } catch (err) {
                    console.error("Webcam error", err);
                    statusMsg.textContent = "Could not access webcam.";
                    statusMsg.style.color = "var(--accent-danger)";
                }
            } else {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                webcamContainer.style.display = 'none';
                uploadMode.style.display = 'block';
                toggleWebcamBtn.textContent = 'Use Webcam';
                isWebcamMode = false;
            }
        });

        loginBtn.addEventListener('click', async () => {
            statusMsg.textContent = 'Authenticating...';
            statusMsg.style.color = 'var(--text-main)';
            loginBtn.disabled = true;

            const formData = new FormData();

            if (isWebcamMode) {
                const canvas = document.createElement('canvas');
                canvas.width = webcam.videoWidth;
                canvas.height = webcam.videoHeight;
                canvas.getContext('2d').drawImage(webcam, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
                formData.append('file', blob, 'webcam.jpg');
            } else {
                if (faceFile.files.length === 0) {
                    statusMsg.textContent = 'Please select an image first.';
                    statusMsg.style.color = 'var(--accent-danger)';
                    loginBtn.disabled = false;
                    return;
                }
                formData.append('file', faceFile.files[0]);
            }

            try {
                const response = await fetch('/face-login', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    statusMsg.textContent = 'Access Granted!';
                    statusMsg.style.color = '#00b894';
                    sessionStorage.setItem('zombie_auth_token', data.token);
                    
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 500);
                } else {
                    statusMsg.textContent = data.message || 'Access Denied';
                    statusMsg.style.color = 'var(--accent-danger)';
                    loginBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                statusMsg.textContent = 'Server error.';
                statusMsg.style.color = 'var(--accent-danger)';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
